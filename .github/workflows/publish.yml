name: Publish TaskFlow Image

on:
  workflow_run:
    workflows:
      - TaskFlow CI
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest

    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Download repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: Taskflow/Taskflow
          file: Taskflow/Taskflow/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/taskflow-api:latest
            ghcr.io/${{ github.repository_owner }}/taskflow-api:${{ github.event.workflow_run.head_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}