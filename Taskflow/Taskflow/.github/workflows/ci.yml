name: TaskFlow CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download repository
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run Go vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -cover ./...

      - name: Build API
        run: go build -o taskflow-api ./cmd/api

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build Docker image
        run: docker build -t taskflow-api:ci .